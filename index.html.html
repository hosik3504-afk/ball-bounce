<html lang="ko"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>공 튀기기 실험실</title>
<style>
html, body {
  width: 100%; height: 100%;
  overflow-x: hidden;
  -webkit-text-size-adjust: 100%;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: rgba(0,0,0,0); }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  background: #f0f4f8;
  padding: 12px;
}
.lab {
  background: #fff;
  border-radius: 14px;
  padding: 14px;
  max-width: 680px;
  margin: 0 auto;
  width: 100%;
}
h1 {
  font-size: 16px; font-weight: 700; color: #1a1a2e;
  margin-bottom: 12px;
}
.controls {
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}
.ctrl-card {
  -webkit-flex: 1; flex: 1;
  border-radius: 10px; padding: 10px 8px;
  border: 1.5px solid #e8edf3;
}
.ctrl-card.hc { background: #f0f7ff; border-color: #bdd5f5; }
.ctrl-card.mc { background: #fff4f0; border-color: #f5c6b0; }
.ctrl-card.sc { background: #f0fff6; border-color: #a8e6c1; }
.ctrl-label {
  font-size: 10px; font-weight: 700; margin-bottom: 7px;
  display: block;
}
.hc .ctrl-label { color: #1a6fc4; }
.mc .ctrl-label { color: #c04a1a; }
.sc .ctrl-label { color: #1a8c4a; }
.btn-group {
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  -webkit-flex-direction: column;
  flex-direction: column;
  gap: 5px;
}
.opt-btn {
  display: block;
  width: 100%;
  background: #fff;
  border: 1.5px solid #dde3ea;
  border-radius: 7px;
  padding: 0;
  font-size: 12px;
  font-weight: 600;
  color: #555;
  text-align: center;
  cursor: pointer;
  height: 36px;
  line-height: 36px;
  -webkit-appearance: none;
  appearance: none;
  outline: none;
  -webkit-user-select: none;
  user-select: none;
  touch-action: manipulation;
}
#height-group .opt-btn.on { background: #1a6fc4; border-color: #1a6fc4; color: #fff; }
#mass-group   .opt-btn.on { background: #c04a1a; border-color: #c04a1a; color: #fff; }
#size-group   .opt-btn.on { background: #1a8c4a; border-color: #1a8c4a; color: #fff; }

.launch-row {
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}
.launch-btn {
  -webkit-flex: 1; flex: 1;
  background: #1a1a2e; border: none; border-radius: 10px;
  color: #fff; font-size: 14px; font-weight: 700;
  height: 48px; line-height: 48px; padding: 0;
  cursor: pointer;
  -webkit-appearance: none; appearance: none;
  touch-action: manipulation;
  -webkit-user-select: none; user-select: none;
  outline: none;
}
.reset-btn {
  background: #f0f2f5; border: 1.5px solid #dde3ea; border-radius: 10px;
  color: #555; font-size: 13px; font-weight: 600;
  height: 48px; padding: 0 14px;
  cursor: pointer;
  -webkit-appearance: none; appearance: none;
  touch-action: manipulation;
  -webkit-user-select: none; user-select: none;
  outline: none;
}
.canvas-wrap {
  border-radius: 10px;
  overflow: hidden;
  border: 1.5px solid #dde3ea;
  margin-bottom: 10px;
  background: #dce8f5;
  width: 100%;
  position: relative;
}
canvas {
  display: block;
  width: 100% !important;
  touch-action: none;
}
.stats-row {
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  -webkit-flex-wrap: wrap;
  flex-wrap: wrap;
  gap: 6px;
}
.stat {
  -webkit-flex: 1 1 calc(50% - 3px);
  flex: 1 1 calc(50% - 3px);
  border-radius: 8px; padding: 9px 8px; text-align: center;
}
.stat:nth-child(1) { background: #eef5ff; }
.stat:nth-child(2) { background: #fff1ee; }
.stat:nth-child(3) { background: #eefff5; }
.stat:nth-child(4) { background: #f5f0ff; }
.stat-label { font-size: 9px; font-weight: 700; margin-bottom: 3px; }
.stat:nth-child(1) .stat-label { color: #1a6fc4; }
.stat:nth-child(2) .stat-label { color: #c04a1a; }
.stat:nth-child(3) .stat-label { color: #1a8c4a; }
.stat:nth-child(4) .stat-label { color: #6a3fc4; }
.stat-val { font-size: 13px; font-weight: 700; color: #1a1a2e; }
</style>
</head>
<body>
<div class="lab">
  <h1>🔬 공 튀기기 실험실</h1>

  <div class="controls">
    <div class="ctrl-card hc">
      <span class="ctrl-label">📏 낙하 높이</span>
      <div class="btn-group" id="height-group">
        <button class="opt-btn on" data-val="1">1 m</button>
        <button class="opt-btn" data-val="2">2 m</button>
        <button class="opt-btn" data-val="3">3 m</button>
      </div>
    </div>
    <div class="ctrl-card mc">
      <span class="ctrl-label">⚖️ 무게</span>
      <div class="btn-group" id="mass-group">
        <button class="opt-btn on" data-val="1">1 kg</button>
        <button class="opt-btn" data-val="2">2 kg</button>
        <button class="opt-btn" data-val="3">3 kg</button>
      </div>
    </div>
    <div class="ctrl-card sc">
      <span class="ctrl-label">⭕ 크기</span>
      <div class="btn-group" id="size-group">
        <button class="opt-btn on" data-val="10">10cm</button>
        <button class="opt-btn" data-val="20">20cm</button>
        <button class="opt-btn" data-val="30">30cm</button>
      </div>
    </div>
  </div>

  <div class="launch-row">
    <button class="launch-btn" id="launch-btn">▶ 실험 시작</button>
    <button class="reset-btn" id="reset-btn">↺ 초기화</button>
  </div>

  <div class="canvas-wrap" id="canvas-wrap">
    <canvas id="sim" width="1304" height="720" style="width: 652px; height: 360px;"></canvas>
  </div>

  <div class="stats-row">
    <div class="stat"><div class="stat-label">낙하 속도</div><div class="stat-val" id="s-vel">—</div></div>
    <div class="stat"><div class="stat-label">바닥 충격력</div><div class="stat-val" id="s-force">—</div></div>
    <div class="stat"><div class="stat-label">최대 반등 높이</div><div class="stat-val" id="s-bounce">—</div></div>
    <div class="stat"><div class="stat-label">튕긴 횟수</div><div class="stat-val" id="s-count">0</div></div>
  </div>
</div>

<script>
(function() {
  var canvas = document.getElementById('sim');
  var ctx = canvas.getContext('2d');

  var G = 9.8, COR = 0.75, PPM = 85, STOP_VEL = 18;
  var params = { height: 1, mass: 1, diameter: 10 };
  var running = false, stopped = false, animId = null, lastTs = null;
  var by, bvy, br, bounceCount, maxBounceH, firstImpactVel, trailPts, squishT;

  function gy() { return canvas.height * 0.87; }
  function br_() { return Math.max(10, (params.diameter / 100) * PPM); }
  function sy_() { var r = br_(); return Math.max(r + 10, gy() - params.height * PPM - r); }

  function reset() {
    by = sy_(); bvy = 0; br = br_();
    bounceCount = 0; maxBounceH = 0; firstImpactVel = null;
    trailPts = []; squishT = 0; stopped = false;
  }

  function drawScene() {
    var W = canvas.width, H = canvas.height, g = gy();
    ctx.clearRect(0, 0, W, H);
    var sky = ctx.createLinearGradient(0,0,0,g);
    sky.addColorStop(0,'#b8d4f0'); sky.addColorStop(1,'#dceaf8');
    ctx.fillStyle = sky; ctx.fillRect(0,0,W,g);
    ctx.fillStyle = '#8fb8d8'; ctx.fillRect(0,g,W,H-g);
    ctx.strokeStyle = '#6a9cbf'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0,g); ctx.lineTo(W,g); ctx.stroke();
    ctx.fillStyle = 'rgba(80,130,170,0.8)';
    ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('지면', W/2, g+16);
    var r = br_(), s = sy_(), mx = W/2+r+18;
    ctx.save();
    ctx.strokeStyle = 'rgba(80,120,160,0.4)'; ctx.lineWidth = 1;
    ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(mx,s+r); ctx.lineTo(mx,g); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(80,120,160,0.8)';
    ctx.font = '12px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText(params.height+' m', mx+5, (s+r+g)/2+4);
    ctx.restore();
  }

  function drawTrail() {
    if (trailPts.length < 2) return;
    for (var i = 1; i < trailPts.length; i++) {
      ctx.strokeStyle = 'rgba(220,80,20,'+(i/trailPts.length*0.28)+')';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(trailPts[i-1].x, trailPts[i-1].y);
      ctx.lineTo(trailPts[i].x, trailPts[i].y);
      ctx.stroke();
    }
  }

  function drawBall(y, sq) {
    var cx = canvas.width/2, r = br, g = gy();
    var sx = sq > 0 ? 1+sq*0.35 : 1;
    var sy2 = sq > 0 ? 1-sq*0.3 : 1;
    ctx.save();
    ctx.translate(cx, y); ctx.scale(sx, sy2);
    var gr = ctx.createRadialGradient(-r*0.3,-r*0.3,r*0.05,0,0,r);
    gr.addColorStop(0,'#ff9a60'); gr.addColorStop(0.5,'#e84e0f'); gr.addColorStop(1,'#8c2800');
    ctx.fillStyle = gr; ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath(); ctx.arc(-r*0.3,-r*0.3,r*0.32,0,Math.PI*2); ctx.fill();
    ctx.restore();
    if (sq > 0) {
      var sw = r*(1+sq*0.4)*2;
      var grd = ctx.createRadialGradient(cx,g,0,cx,g,sw/2);
      grd.addColorStop(0,'rgba(0,0,0,'+(sq*0.28)+')');
      grd.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.ellipse(cx,g+2,sw/2,5,0,0,Math.PI*2); ctx.fill();
    }
  }

  function render() { drawScene(); drawTrail(); drawBall(by, squishT > 0 ? squishT : 0); }

  function step(dt) {
    dt = Math.min(dt, 0.04);
    var g = gy();
    if (stopped) return;
    if (squishT > 0) { squishT -= dt*8; if (squishT < 0) squishT = 0; return; }
    bvy += G * PPM * dt;
    by += bvy * dt;
    if (bvy > 0) { trailPts.push({x:canvas.width/2, y:by}); if (trailPts.length>50) trailPts.shift(); }
    if (by + br >= g) {
      by = g - br;
      var vm = Math.abs(bvy / PPM);
      if (firstImpactVel === null) {
        firstImpactVel = vm;
        document.getElementById('s-vel').textContent = vm.toFixed(2)+' m/s';
        document.getElementById('s-force').textContent = (params.mass*vm/0.03).toFixed(1)+' N';
      }
      var nv = bvy * COR * -1;
      bounceCount++;
      document.getElementById('s-count').textContent = bounceCount;
      if (Math.abs(nv) < STOP_VEL) {
        bvy = 0; squishT = 0; stopped = true; running = false; trailPts = [];
        render(); return;
      }
      bvy = nv; trailPts = []; squishT = 1;
      var ph = (bvy*bvy)/(2*G*PPM*PPM);
      if (ph > maxBounceH) {
        maxBounceH = ph;
        document.getElementById('s-bounce').textContent = maxBounceH.toFixed(2)+' m';
      }
    }
  }

  function loop(ts) {
    if (!lastTs) lastTs = ts;
    step((ts-lastTs)/1000); lastTs = ts;
    render();
    if (running) animId = requestAnimationFrame(loop);
  }

  function clearStats() {
    document.getElementById('s-vel').textContent = '—';
    document.getElementById('s-force').textContent = '—';
    document.getElementById('s-bounce').textContent = '—';
    document.getElementById('s-count').textContent = '0';
  }

  // 카카오톡 인앱브라우저 대응: touchstart+touchend 방식
  function onTap(el, fn) {
    var startY = 0;
    el.addEventListener('touchstart', function(e) {
      startY = e.touches[0].clientY;
    }, { passive: true });
    el.addEventListener('touchend', function(e) {
      var dy = Math.abs(e.changedTouches[0].clientY - startY);
      if (dy > 10) return; // 스크롤이면 무시
      e.preventDefault();
      fn();
    }, { passive: false });
    el.addEventListener('click', fn);
  }

  onTap(document.getElementById('launch-btn'), function() {
    if (running) return;
    if (animId) cancelAnimationFrame(animId);
    reset(); clearStats();
    running = true; lastTs = null;
    animId = requestAnimationFrame(loop);
  });

  onTap(document.getElementById('reset-btn'), function() {
    running = false;
    if (animId) cancelAnimationFrame(animId);
    reset(); clearStats(); render();
  });

  var groups = [
    { id: 'height-group', key: 'height' },
    { id: 'mass-group',   key: 'mass' },
    { id: 'size-group',   key: 'diameter' }
  ];

  groups.forEach(function(g) {
    var group = document.getElementById(g.id);
    var btns = group.querySelectorAll('.opt-btn');

    function select(btn) {
      if (running) return;
      for (var i = 0; i < btns.length; i++) btns[i].classList.remove('on');
      btn.classList.add('on');
      params[g.key] = parseFloat(btn.getAttribute('data-val'));
      reset(); render();
    }

    for (var i = 0; i < btns.length; i++) {
      (function(btn) {
        var startY = 0;
        btn.addEventListener('touchstart', function(e) {
          startY = e.touches[0].clientY;
        }, { passive: true });
        btn.addEventListener('touchend', function(e) {
          var dy = Math.abs(e.changedTouches[0].clientY - startY);
          if (dy > 10) return;
          e.preventDefault();
          select(btn);
        }, { passive: false });
        btn.addEventListener('click', function() { select(btn); });
      })(btns[i]);
    }
  });

  function initCanvas() {
    var wrap = document.getElementById('canvas-wrap');
    var dpr = window.devicePixelRatio || 1;
    var displayW = wrap.offsetWidth || 300;
    var displayH = Math.round(Math.min(Math.max(displayW * 0.62, 240), 360));
    canvas.width = Math.round(displayW * dpr);
    canvas.height = Math.round(displayH * dpr);
    canvas.style.width = displayW + 'px';
    canvas.style.height = displayH + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    reset(); render();
  }

  // 카카오 인앱브라우저는 DOMContentLoaded 이후에도 레이아웃이 늦게 확정되는 경우가 있음
  setTimeout(initCanvas, 100);
  setTimeout(initCanvas, 400);

  window.addEventListener('resize', function() {
    if (!running) initCanvas();
  });
})();
</script>


</body></html>
