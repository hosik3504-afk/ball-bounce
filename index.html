<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>공 튀기기 실험실</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:sans-serif;background:#f0f4f8;padding:12px;}
.lab{background:#fff;border-radius:14px;padding:14px;max-width:680px;margin:0 auto;}
h1{font-size:16px;font-weight:700;color:#1a1a2e;margin-bottom:12px;}
.controls{display:flex;gap:8px;margin-bottom:10px;}
.ctrl-card{flex:1;border-radius:10px;padding:10px 8px;border:1.5px solid #e8edf3;}
.ctrl-card.hc{background:#f0f7ff;border-color:#bdd5f5;}
.ctrl-card.mc{background:#fff4f0;border-color:#f5c6b0;}
.ctrl-card.sc{background:#f0fff6;border-color:#a8e6c1;}
.ctrl-label{font-size:10px;font-weight:700;margin-bottom:7px;display:block;}
.hc .ctrl-label{color:#1a6fc4;}.mc .ctrl-label{color:#c04a1a;}.sc .ctrl-label{color:#1a8c4a;}
.btn-group{display:flex;flex-direction:column;gap:5px;}
.opt-btn{width:100%;background:#fff;border:1.5px solid #dde3ea;border-radius:7px;font-size:12px;font-weight:600;color:#555;text-align:center;cursor:pointer;padding:8px 0;}
#height-group .opt-btn.on{background:#1a6fc4;border-color:#1a6fc4;color:#fff;}
#mass-group .opt-btn.on{background:#c04a1a;border-color:#c04a1a;color:#fff;}
#size-group .opt-btn.on{background:#1a8c4a;border-color:#1a8c4a;color:#fff;}
.launch-row{display:flex;gap:8px;margin-bottom:10px;}
.launch-btn{flex:1;background:#1a1a2e;border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;padding:13px;cursor:pointer;}
.reset-btn{background:#f0f2f5;border:1.5px solid #dde3ea;border-radius:10px;color:#555;font-size:13px;font-weight:600;padding:13px 14px;cursor:pointer;}
.canvas-wrap{border-radius:10px;overflow:hidden;border:1.5px solid #dde3ea;margin-bottom:10px;background:#dce8f5;}
canvas{display:block;}
.stats-row{display:flex;flex-wrap:wrap;gap:6px;}
.stat{flex:1 1 calc(50% - 3px);border-radius:8px;padding:9px 8px;text-align:center;}
.stat:nth-child(1){background:#eef5ff;}.stat:nth-child(2){background:#fff1ee;}
.stat:nth-child(3){background:#eefff5;}.stat:nth-child(4){background:#f5f0ff;}
.stat-label{font-size:9px;font-weight:700;margin-bottom:3px;}
.stat:nth-child(1) .stat-label{color:#1a6fc4;}.stat:nth-child(2) .stat-label{color:#c04a1a;}
.stat:nth-child(3) .stat-label{color:#1a8c4a;}.stat:nth-child(4) .stat-label{color:#6a3fc4;}
.stat-val{font-size:13px;font-weight:700;color:#1a1a2e;}
</style>
</head>
<body>
<div class="lab">
  <h1>🔬 공 튀기기 실험실</h1>
  <div class="controls">
    <div class="ctrl-card hc">
      <span class="ctrl-label">📏 낙하 높이</span>
      <div class="btn-group" id="height-group">
        <button class="opt-btn on" data-val="1">1 m</button>
        <button class="opt-btn" data-val="2">2 m</button>
        <button class="opt-btn" data-val="3">3 m</button>
      </div>
    </div>
    <div class="ctrl-card mc">
      <span class="ctrl-label">⚖️ 무게</span>
      <div class="btn-group" id="mass-group">
        <button class="opt-btn on" data-val="1">1 kg</button>
        <button class="opt-btn" data-val="2">2 kg</button>
        <button class="opt-btn" data-val="3">3 kg</button>
      </div>
    </div>
    <div class="ctrl-card sc">
      <span class="ctrl-label">⭕ 크기</span>
      <div class="btn-group" id="size-group">
        <button class="opt-btn on" data-val="10">10cm</button>
        <button class="opt-btn" data-val="20">20cm</button>
        <button class="opt-btn" data-val="30">30cm</button>
      </div>
    </div>
  </div>
  <div class="launch-row">
    <button class="launch-btn" id="launch-btn">▶ 실험 시작</button>
    <button class="reset-btn" id="reset-btn">↺ 초기화</button>
  </div>
  <div class="canvas-wrap" id="cwrap">
    <canvas id="sim"></canvas>
  </div>
  <div class="stats-row">
    <div class="stat"><div class="stat-label">낙하 속도</div><div class="stat-val" id="s-vel">—</div></div>
    <div class="stat"><div class="stat-label">바닥 충격력</div><div class="stat-val" id="s-force">—</div></div>
    <div class="stat"><div class="stat-label">최대 반등 높이</div><div class="stat-val" id="s-bounce">—</div></div>
    <div class="stat"><div class="stat-label">튕긴 횟수</div><div class="stat-val" id="s-count">0</div></div>
  </div>
</div>
<script>
var canvas = document.getElementById('sim');
var ctx = canvas.getContext('2d');
var G=9.8, COR=0.75, PPM=85, STOP=18;
var params = {height:1, mass:1, diameter:10};
var running=false, stopped=false, tid=null;
var by, bvy, br, bounceCount, maxBounceH, firstImpact, trailPts, squishT;
var W, H, lastT;

function initCanvas() {
  var wrap = document.getElementById('cwrap');
  W = wrap.clientWidth || 300;
  H = Math.round(Math.min(Math.max(W * 0.62, 240), 360));
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  resetBall();
  render();
}

function gy() { return H * 0.87; }
function getBR() { return Math.max(10, (params.diameter/100) * PPM); }
function getSY() { var r=getBR(); return Math.max(r+10, gy()-params.height*PPM-r); }

function resetBall() {
  by=getSY(); bvy=0; br=getBR();
  bounceCount=0; maxBounceH=0; firstImpact=null;
  trailPts=[]; squishT=0; stopped=false;
}

function drawScene() {
  var g = gy();
  ctx.clearRect(0,0,W,H);
  var sky = ctx.createLinearGradient(0,0,0,g);
  sky.addColorStop(0,'#b8d4f0'); sky.addColorStop(1,'#dceaf8');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,g);
  ctx.fillStyle='#8fb8d8'; ctx.fillRect(0,g,W,H-g);
  ctx.strokeStyle='#6a9cbf'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(0,g); ctx.lineTo(W,g); ctx.stroke();
  ctx.fillStyle='rgba(80,130,170,0.8)';
  ctx.font='12px sans-serif'; ctx.textAlign='center';
  ctx.fillText('지면', W/2, g+16);
  var r=getBR(), s=getSY(), mx=W/2+r+18;
  ctx.strokeStyle='rgba(80,120,160,0.4)'; ctx.lineWidth=1;
  ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(mx,s+r); ctx.lineTo(mx,g); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='rgba(80,120,160,0.8)';
  ctx.font='12px sans-serif'; ctx.textAlign='left';
  ctx.fillText(params.height+' m', mx+5, (s+r+g)/2+4);
}

function drawBall(y, sq) {
  var cx=W/2, r=br, g=gy();
  var sx = sq>0 ? 1+sq*0.35 : 1;
  var sy2 = sq>0 ? 1-sq*0.3 : 1;
  ctx.save();
  ctx.translate(cx, y); ctx.scale(sx, sy2);
  var gr = ctx.createRadialGradient(-r*.3,-r*.3,r*.05,0,0,r);
  gr.addColorStop(0,'#ff9a60'); gr.addColorStop(.5,'#e84e0f'); gr.addColorStop(1,'#8c2800');
  ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.beginPath(); ctx.arc(-r*.3,-r*.3,r*.32,0,Math.PI*2); ctx.fill();
  ctx.restore();
  if(sq>0){
    var sw=r*(1+sq*0.4)*2;
    var grd=ctx.createRadialGradient(cx,g,0,cx,g,sw/2);
    grd.addColorStop(0,'rgba(0,0,0,'+(sq*0.25)+')');
    grd.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=grd;
    ctx.beginPath(); ctx.ellipse(cx,g+2,sw/2,5,0,0,Math.PI*2); ctx.fill();
  }
}

function drawTrail() {
  for(var i=1;i<trailPts.length;i++){
    ctx.strokeStyle='rgba(220,80,20,'+(i/trailPts.length*0.25)+')';
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(trailPts[i-1].x, trailPts[i-1].y);
    ctx.lineTo(trailPts[i].x, trailPts[i].y);
    ctx.stroke();
  }
}

function render() {
  drawScene();
  drawTrail();
  drawBall(by, squishT>0 ? squishT : 0);
}

function tick() {
  var now = Date.now();
  if(!lastT){ lastT=now; return; }
  var dt = Math.min((now-lastT)/1000, 0.04);
  lastT = now;
  var g = gy();
  if(stopped){ stop(); return; }
  if(squishT>0){ squishT-=dt*8; if(squishT<0)squishT=0; render(); return; }
  bvy += G*PPM*dt;
  by += bvy*dt;
  if(bvy>0){ trailPts.push({x:W/2,y:by}); if(trailPts.length>50)trailPts.shift(); }
  if(by+br >= g){
    by = g-br;
    var vm = Math.abs(bvy/PPM);
    if(firstImpact===null){
      firstImpact=vm;
      document.getElementById('s-vel').textContent=vm.toFixed(2)+' m/s';
      document.getElementById('s-force').textContent=(params.mass*vm/0.03).toFixed(1)+' N';
    }
    var nv = bvy*COR*-1;
    bounceCount++;
    document.getElementById('s-count').textContent=bounceCount;
    if(Math.abs(nv)<STOP){
      bvy=0; squishT=0; stopped=true; running=false; trailPts=[];
      render(); stop(); return;
    }
    bvy=nv; trailPts=[]; squishT=1;
    var ph=(bvy*bvy)/(2*G*PPM*PPM);
    if(ph>maxBounceH){ maxBounceH=ph; document.getElementById('s-bounce').textContent=maxBounceH.toFixed(2)+' m'; }
  }
  render();
}

function stop() { if(tid){ clearInterval(tid); tid=null; } }

function start() {
  stop();
  lastT = null;
  tid = setInterval(tick, 16);
}

function clearStats() {
  document.getElementById('s-vel').textContent='—';
  document.getElementById('s-force').textContent='—';
  document.getElementById('s-bounce').textContent='—';
  document.getElementById('s-count').textContent='0';
}

document.getElementById('launch-btn').addEventListener('click', function(){
  if(running) return;
  resetBall(); clearStats(); running=true; start();
});
document.getElementById('reset-btn').addEventListener('click', function(){
  running=false; stop(); resetBall(); clearStats(); render();
});

var groups = [
  {id:'height-group', key:'height'},
  {id:'mass-group', key:'mass'},
  {id:'size-group', key:'diameter'}
];
groups.forEach(function(g){
  var grp = document.getElementById(g.id);
  var btns = grp.querySelectorAll('.opt-btn');
  btns.forEach(function(btn){
    btn.addEventListener('click', function(){
      if(running) return;
      btns.forEach(function(b){ b.classList.remove('on'); });
      btn.classList.add('on');
      params[g.key] = parseFloat(btn.getAttribute('data-val'));
      resetBall(); render();
    });
  });
});

window.addEventListener('load', function(){ setTimeout(initCanvas, 100); });
window.addEventListener('resize', function(){ if(!running) initCanvas(); });
</script>
</body>
</html>
